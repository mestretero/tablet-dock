<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Dock</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/icon-512.png?v=2" />
  <link rel="apple-touch-icon" href="/icon-192.png?v=2" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="shift">
    <!-- ======================= ANA ======================= -->
    <section class="tab" data-tab="ana">
      <header class="clock-zone">
        <div id="clock" class="clock">--:--</div>
        <div id="date" class="date">—</div>
      </header>

      <div class="stat-strip">
        <div class="stat-mini">
          <span class="sm-label">CPU</span>
          <div class="sm-bar"><div id="cpuBar"></div></div>
          <span class="sm-val"><span id="cpu">—</span>%</span>
        </div>
        <div class="stat-mini">
          <span class="sm-label">RAM</span>
          <div class="sm-bar"><div id="ramBar"></div></div>
          <span class="sm-val"><span id="ram">—</span>%</span>
        </div>
      </div>

      <section class="panel">
        <h2 class="label">Programlar</h2>
        <div id="apps" class="apps">
          <div class="apps-empty">Yükleniyor…</div>
        </div>
      </section>

      <section class="panel">
        <button id="projToggle" class="section-toggle" aria-expanded="false">
          <span class="label">Projeler</span>
          <svg class="chevron" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="projects" class="projects" hidden></div>
      </section>
    </section>

    <!-- ======================= OYUNLAR ======================= -->
    <section class="tab" data-tab="oyunlar" hidden>
      <section class="panel">
        <h2 class="label">Oyunlar</h2>
        <div id="games" class="games">
          <div class="games-empty">Yükleniyor…</div>
        </div>
      </section>
    </section>

    <!-- ===================== MEDYA + PANO ===================== -->
    <section class="tab" data-tab="medya" hidden>
      <section class="panel">
        <h2 class="label">Medya</h2>
        <div class="now-playing" id="np" hidden>
          <span class="np-title" id="npTitle"></span>
          <span class="np-artist" id="npArtist"></span>
        </div>
        <div class="media">
          <div class="media-keys">
            <button class="mbtn" data-media="prev" aria-label="Önceki">
              <svg viewBox="0 0 24 24"><path d="M6 6v12M20 6l-9 6 9 6z"/></svg>
            </button>
            <button id="ppBtn" class="mbtn mbtn-lg" data-media="playpause" aria-label="Oynat/Duraklat">
              <svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg>
            </button>
            <button class="mbtn" data-media="next" aria-label="Sonraki">
              <svg viewBox="0 0 24 24"><path d="M18 6v12M4 6l9 6-9 6z"/></svg>
            </button>
          </div>
          <div class="volume">
            <button id="muteBtn" class="mbtn mbtn-sm" aria-label="Sustur">
              <svg viewBox="0 0 24 24"><path d="M4 9v6h4l5 4V5L8 9H4z"/></svg>
            </button>
            <input id="vol" class="slider" type="range" min="0" max="100" value="50"
                   aria-label="Ses seviyesi" />
            <span id="volVal" class="vol-val">50</span>
          </div>
        </div>
        <div id="audioOut" class="audio-out"></div>
      </section>

      <section class="panel">
        <h2 class="label">Pano</h2>
        <div id="clipboard" class="clipboard"></div>
      </section>
    </section>

    <!-- ======================= ASİSTAN ======================= -->
    <section class="tab" data-tab="asistan" hidden>
      <div class="assistant">
        <div id="chatReply" class="chat-reply" hidden></div>
        <button id="micBtn" class="mic-orb" aria-label="Sor">
          <span class="orb-ring"></span>
          <svg class="mic-icon" viewBox="0 0 24 24">
            <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
            <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
          </svg>
        </button>
        <div id="micHint" class="mic-hint">Konuşmak için dokun</div>
        <button id="micWebBtn" class="web-pill" aria-label="İnternette ara">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="9"/>
            <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/>
          </svg>
          <span>İnternette ara</span>
        </button>
      </div>
    </section>
  </main>

  <!-- Alt sekme çubuğu (pill nav) -->
  <nav class="tabbar">
    <button class="tab-btn" data-go="ana" aria-label="Ana">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7M5 10v10h14V10"/></svg>
      <span>Ana</span>
    </button>
    <button class="tab-btn" data-go="oyunlar" aria-label="Oyunlar">
      <svg viewBox="0 0 24 24"><path d="M7 11h3M8.5 9.5v3"/><circle cx="15.5" cy="10.5" r="1"/><circle cx="17.5" cy="13" r="1"/><path d="M17 7H7a5 5 0 0 0 0 10c1.4 0 2-1 3-1h4c1 0 1.6 1 3 1a5 5 0 0 0 0-10z"/></svg>
      <span>Oyunlar</span>
    </button>
    <button class="tab-btn" data-go="medya" aria-label="Medya ve Pano">
      <svg viewBox="0 0 24 24"><path d="M9 18V6l11-2v12"/><circle cx="6" cy="18" r="3"/><circle cx="17" cy="16" r="3"/></svg>
      <span>Medya</span>
    </button>
    <button class="tab-btn" data-go="asistan" aria-label="Asistan">
      <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>
      <span>Asistan</span>
    </button>
  </nav>

  <script src="/app.js"></script>
</body>
</html>
